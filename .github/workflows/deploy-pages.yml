name: Deploy compiled assets to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "accelevents/**"
      - "index.html"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack and install dependencies
        working-directory: accelevents
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: Build assets
        working-directory: accelevents
        run: yarn build

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/accelevents/css _site/accelevents/js _site/accelevents/images
          cp index.html _site/index.html
          cp -r accelevents/dist/hosted/css/. _site/accelevents/css/
          cp -r accelevents/dist/hosted/js/. _site/accelevents/js/
          cp -r accelevents/dist/hosted/images/. _site/accelevents/images/

      # Commits the built _site/ contents to the `compiled` branch after every merge to main.
      # The structure mirrors what's served on GitHub Pages (accelevents/css, js, images)
      # making it easy to compare compiled output between versions via git history,
      # without committing build artifacts to the main branch.
      - name: Commit compiled assets to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # fetch existing `compiled` branch, or create a fresh orphan branch if it doesn't exist yet
          if git fetch origin compiled:compiled 2>/dev/null; then
            git checkout compiled
          else
            git checkout --orphan compiled
          fi
          # clear everything so no leftover files from main bleed in
          git rm -rf . 2>/dev/null || true
          # copy only the compiled accelevents assets — mirrors the GitHub Pages URL structure
          cp -r _site/accelevents .
          git add accelevents/
          # skip commit if build output is identical to last run
          git diff --cached --quiet || git commit -m "build: compiled assets from ${{ github.sha }}"
          git push origin compiled

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
