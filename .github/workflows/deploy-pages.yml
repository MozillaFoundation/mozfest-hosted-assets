name: Deploy compiled assets to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "accelevents/**"
      - "index.html"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack and install dependencies
        working-directory: accelevents
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: Build assets
        working-directory: accelevents
        run: yarn build

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/accelevents/css _site/accelevents/js _site/accelevents/images
          cp index.html _site/index.html
          cp -r accelevents/dist/hosted/css/. _site/accelevents/css/
          cp -r accelevents/dist/hosted/js/. _site/accelevents/js/
          cp -r accelevents/dist/hosted/images/. _site/accelevents/images/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
