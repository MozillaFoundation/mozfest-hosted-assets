name: Update compiled branch

on:
  push:
    branches:
      - main
    paths:
      - "accelevents/**"
      - "index.html"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack and install dependencies
        working-directory: accelevents
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: Build assets
        working-directory: accelevents
        run: yarn build

      - name: Prepare artifact
        run: |
          mkdir -p _site/accelevents/css _site/accelevents/js _site/accelevents/images
          cp index.html _site/index.html
          cp -r accelevents/dist/hosted/css/. _site/accelevents/css/
          cp -r accelevents/dist/hosted/js/. _site/accelevents/js/
          cp -r accelevents/dist/hosted/images/. _site/accelevents/images/

      # Commits the built _site/ contents to the `compiled` branch after every merge to main.
      # Makes it easy to compare compiled output between versions via git history.
      - name: Commit compiled assets to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # move built assets out of the repo before switching branches
          cp -r _site /tmp/compiled-assets
          # fetch existing `compiled` branch, or create a fresh orphan branch if it doesn't exist yet
          if git fetch origin compiled:compiled 2>/dev/null; then
            git checkout compiled
          else
            git checkout --orphan compiled
          fi
          # remove tracked files and all untracked/ignored leftovers from the main checkout
          git rm -rf . 2>/dev/null || true
          git clean -fdx
          # copy built assets back in
          cp -r /tmp/compiled-assets/. .
          git add accelevents/ index.html
          # skip commit if build output is identical to last run
          git diff --cached --quiet || git commit -m "build: compiled assets from ${{ github.sha }}"
          git push origin compiled
